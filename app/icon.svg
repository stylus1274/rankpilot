<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Blue circle background matching #1d63ff brand color -->
  <circle cx="128" cy="128" r="128" fill="#1d63ff"/>

  <!-- Gauge / speedometer icon — matches the Lucide Gauge used in the site logo -->
  <!-- Outer arc (270° sweep, from ~135° to ~405°, i.e. bottom-left to bottom-right) -->
  <path
    d="M 52 156 A 80 80 0 1 1 204 156"
    fill="none"
    stroke="rgba(255,255,255,0.25)"
    stroke-width="16"
    stroke-linecap="round"
  />
  <!-- Active arc — about 60% filled, blue-white -->
  <path
    d="M 52 156 A 80 80 0 0 1 168 68"
    fill="none"
    stroke="white"
    stroke-width="16"
    stroke-linecap="round"
  />
  <!-- Needle — pointing to ~11 o'clock (high performance) -->
  <line
    x1="128" y1="128"
    x2="88" y2="82"
    stroke="white"
    stroke-width="10"
    stroke-linecap="round"
  />
  <!-- Center dot -->
  <circle cx="128" cy="128" r="10" fill="white"/>
  <!-- Small tick marks at min and max -->
  <line x1="52" y1="156" x2="62" y2="148" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="204" y1="156" x2="194" y2="148" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
</svg>
